# Render Blueprint for the announcement-app
# Place in the project root, commit, then create a Blueprint on render.com.
services:
  - type: web
    name: announcement-app
    runtime: docker
    repo: https://github.com/connect2hj/shopify-announcement.git
    branch: main
    region: singapore # closest free region to you
    plan: free
    dockerfilePath: ./Dockerfile
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      # SQLite session store. NOTE: the free plan has no persistent disk,
      # so this file resets on every deploy / spin-down (sessions are lost
      # and users re-auth). Fine for a demo. See README notes to persist it.
      - key: DATABASE_URL
        value: file:./dev.db
      # Secrets — Render will prompt for these in the dashboard (never in git)
      - key: SHOPIFY_API_KEY
        sync: false
      - key: SHOPIFY_API_SECRET
        sync: false
      - key: SHOPIFY_APP_URL
        sync: false
      - key: MONGODB_URI
        sync: false
